services:
  anima-gateway:
    image: ${ANIMA_IMAGE:-anima:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ANIMA_GATEWAY_TOKEN: ${ANIMA_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ANIMA_CONFIG_DIR}:/home/node/.anima
      - ${ANIMA_WORKSPACE_DIR}:/home/node/.anima/workspace
    ports:
      - "${ANIMA_GATEWAY_PORT:-18789}:18789"
      - "${ANIMA_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${ANIMA_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  anima-cli:
    image: ${ANIMA_IMAGE:-anima:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ANIMA_GATEWAY_TOKEN: ${ANIMA_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${ANIMA_CONFIG_DIR}:/home/node/.anima
      - ${ANIMA_WORKSPACE_DIR}:/home/node/.anima/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
