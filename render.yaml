services:
  - type: web
    name: anima
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ANIMA_STATE_DIR
        value: /data/.anima
      - key: ANIMA_WORKSPACE_DIR
        value: /data/workspace
      - key: ANIMA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: anima-data
      mountPath: /data
      sizeGB: 1
